<script>
document.addEventListener("DOMContentLoaded", function () {

  // ===================== SUPABASE CONFIG =====================
  const SUPABASE_URL = 'https://rirphktyuzkcczyawqsj.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpcnBoa3R5dXprY2N6eWF3cXNqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMyMTgwNTYsImV4cCI6MjA4ODc5NDA1Nn0.z-6Usp3WpoxJ5-fM1ZrUf4xYX5Y7E6fWQ9xxMCPWVX4';

    });
    if (!res.ok) throw new Error('Select failed: ' + res.status + ' ' + (await res.text()));
    return res.json();
  }

  // ===================== SHOP CONFIG =====================
  const SHOP_DOMAIN = "kristallkraft-pferdefutter.de";

  const produkte = [
    { id: "42640144892146", name: "Kristallkraft No1" },
    { id: "42640145514738", name: "Kristallkraft No2" },
    { id: "43527031652617", name: "Kristallkraft Coolly" },
    { id: "42640147874034", name: "Kristallkraft Move" },
    { id: "42640136569074", name: "Kristallkraft Bronchiale" },
    { id: "42640142270706", name: "Kristallkraft Femmina" },
    { id: "42640136044786", name: "Kristallkraft Brave Horse" },
    { id: "42640139124978", name: "Kristallkraft Core" },
    { id: "44241608769801", name: "Kristallkraft Muscolo" },
    { id: "42640147185906", name: "Kristallkraft Mental Balance" },
    { id: "42712424906994", name: "Kristallkraft TheMineral" }
  ];

  const icons = {
    "Kristallkraft Coolly": "https://cdn.shopify.com/s/files/1/0632/5449/5474/files/cl_gratissack.svg",
    "Kristallkraft No1": "https://cdn.shopify.com/s/files/1/0632/5449/5474/files/no1_gratissack.svg",
    "Kristallkraft No2": "https://cdn.shopify.com/s/files/1/0632/5449/5474/files/no2_gratissack.svg",
    "Kristallkraft Move": "https://cdn.shopify.com/s/files/1/0632/5449/5474/files/move_gratissack.svg",
    "Kristallkraft Bronchiale": "https://cdn.shopify.com/s/files/1/0632/5449/5474/files/bro_gratissack.svg",
    "Kristallkraft TheMineral": "https://cdn.shopify.com/s/files/1/0632/5449/5474/files/tm_gratissack.svg",
    "Kristallkraft Mental Balance": "https://cdn.shopify.com/s/files/1/0632/5449/5474/files/mb_gratissack.svg",
    "Kristallkraft Muscolo": "https://cdn.shopify.com/s/files/1/0632/5449/5474/files/muscolo_gratissack.svg",
    "Kristallkraft Femmina": "https://cdn.shopify.com/s/files/1/0632/5449/5474/files/femmina_gratissack.svg",
    "Kristallkraft Brave Horse": "https://cdn.shopify.com/s/files/1/0632/5449/5474/files/brave_horse_gratissack.svg",
    "Kristallkraft Core": "https://cdn.shopify.com/s/files/1/0632/5449/5474/files/core_gratissack.svg"
  };

  let addedProducts = [];

  // ===================== KW HELPERS =====================
  function getISOWeek(d) {
    const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const dayNum = date.getUTCDay() || 7;
    date.setUTCDate(date.getUTCDate() + 4 - dayNum);
    const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
    return { year: date.getUTCFullYear(), week: Math.ceil(((date - yearStart) / 86400000 + 1) / 7) };
  }

  function getCurrentKW() {
    const { year, week } = getISOWeek(new Date());
    return year + '-W' + String(week).padStart(2, '0');
  }

  function getWeeksInRange(monthsBack) {
    const weeks = [], now = new Date(), start = new Date(now);
    start.setMonth(start.getMonth() - monthsBack);
    const seen = new Set(), d = new Date(start);
    while (d <= now) {
      const { year, week } = getISOWeek(d);
      const key = year + '-W' + String(week).padStart(2, '0');
      if (!seen.has(key)) { seen.add(key); weeks.push({ year, week, key }); }
      d.setDate(d.getDate() + 1);
    }
    return weeks;
  }

  function groupByMonth(weeks) {
    const months = {};
    weeks.forEach(w => {
      const jan4 = new Date(Date.UTC(w.year, 0, 4));
      const dow = jan4.getUTCDay() || 7;
      const fm = new Date(jan4); fm.setUTCDate(jan4.getUTCDate() - dow + 1);
      const ws = new Date(fm); ws.setUTCDate(fm.getUTCDate() + (w.week - 1) * 7);
      const thu = new Date(ws); thu.setUTCDate(ws.getUTCDate() + 3);
      const mk = thu.getUTCFullYear() + '-' + String(thu.getUTCMonth() + 1).padStart(2, '0');
      const ml = thu.toLocaleString('de-DE', { month: 'long', year: 'numeric', timeZone: 'UTC' });
      if (!months[mk]) months[mk] = { label: ml, weeks: [] };
      months[mk].weeks.push(w);
    });
    return months;
  }

  // ===================== STATS: WRITE =====================
  async function recordAngebot(beraterin, kontaktkanal, produktAnzahl) {
    try {
      await supabaseInsert('angebot_stats', {
        kalenderwoche: getCurrentKW(),
        beraterin: beraterin || null,
        kontaktkanal: kontaktkanal || null,
        produkt_anzahl: produktAnzahl
      });
      console.log('✅ Stat recorded');
    } catch (e) {
      console.error('❌ Stat recording failed:', e);
    }
  }

  // ===================== STATS: READ & RENDER =====================
  async function loadAndRenderStats() {
    const loading = document.getElementById('statsLoading');
    const table = document.getElementById('statsTable');

    try {
      const weeks = getWeeksInRange(12);
      const kwFilter = weeks.map(w => '"' + w.key + '"').join(',');
      const rows = await supabaseSelect('angebot_stats', 'kalenderwoche=in.(' + kwFilter + ')&select=kalenderwoche,beraterin');

      const weekData = {};
      let grandTotal = 0;
      rows.forEach(row => {
        const kw = row.kalenderwoche;
        if (!weekData[kw]) weekData[kw] = { total: 0, berater: {} };
        weekData[kw].total++;
        grandTotal++;
        const b = row.beraterin || 'Unbekannt';
        weekData[kw].berater[b] = (weekData[kw].berater[b] || 0) + 1;
      });

      document.getElementById('statsTotal').textContent = grandTotal;

      const months = groupByMonth(weeks);
      const me = Object.entries(months).sort((a, b) => a[0].localeCompare(b[0]));
      const maxW = Math.max(...me.map(([, m]) => m.weeks.length));

      let hHTML = '<tr><th>Monat</th>';
      for (let i = 0; i < maxW; i++) hHTML += '<th>KW</th>';
      hHTML += '<th>Σ</th></tr>';
      document.getElementById('statsHead').innerHTML = hHTML;

      let bHTML = '';
      me.forEach(([, month]) => {
        let mt = 0;
        bHTML += '<tr><td>' + month.label + '</td>';
        month.weeks.forEach(w => {
          const d = weekData[w.key], c = d ? d.total : 0;
          mt += c;
          bHTML += '<td class="kw-cell" data-week="' + w.key + '" title="KW ' + w.week + '">';
          bHTML += '<div style="font-size:10px;color:#999;">KW' + w.week + '</div>';
          bHTML += c > 0 ? '<span class="kw-count has-data">' + c + '</span>' : '<span class="kw-count no-data">–</span>';
          bHTML += '</td>';
        });
        for (let i = month.weeks.length; i < maxW; i++) bHTML += '<td></td>';
        bHTML += '<td><strong>' + mt + '</strong></td></tr>';
      });

      const tbody = document.getElementById('statsBody');
      tbody.innerHTML = bHTML;

      tbody.querySelectorAll('.kw-cell').forEach(cell => {
        cell.addEventListener('click', () => {
          showDetail(cell.dataset.week, weekData[cell.dataset.week]);
          tbody.querySelectorAll('.kw-cell').forEach(c => c.classList.remove('active'));
          cell.classList.add('active');
        });
      });

      loading.style.display = 'none';
      table.style.display = 'table';
    } catch (e) {
      console.error('Stats load error:', e);
      loading.innerHTML = '<div class="stats-error">⚠️ Statistiken konnten nicht geladen werden.<br><small>' + e.message + '</small></div>';
    }
  }

  function showDetail(weekKey, data) {
    const panel = document.getElementById('statsDetail');
    const title = document.getElementById('detailTitle');
    const grid = document.getElementById('detailGrid');
    title.textContent = 'KW ' + parseInt(weekKey.split('-W')[1]) + ' – Aufschlüsselung nach Beraterin';

    if (!data || !data.berater || Object.keys(data.berater).length === 0) {
      grid.innerHTML = '<div class="detail-item"><div class="name">Keine Daten</div><div class="count">–</div></div>';
    } else {
      const sorted = Object.entries(data.berater).sort((a, b) => b[1] - a[1]);
      grid.innerHTML = sorted.map(([n, c]) => '<div class="detail-item"><div class="name">' + n + '</div><div class="count">' + c + '</div></div>').join('');
    }
    panel.classList.add('visible');
  }

  // ===================== PRODUCT DROPDOWN =====================
  const produktSelect = document.getElementById("produktSelect");
  produkte.forEach(prod => {
    const o = document.createElement("option"); o.value = prod.id; o.textContent = prod.name;
    produktSelect.appendChild(o);
  });

  // ===================== SESSION =====================
  const sb = sessionStorage.getItem("beraterin");
  if (sb) document.getElementById("beraterin").value = sb;
  document.getElementById("beraterin").addEventListener("change", e => sessionStorage.setItem("beraterin", e.target.value));

  document.getElementById("outputMode").addEventListener("change", e => {
    const cb = document.getElementById("copyButton");
    cb.style.display = (e.target.value === "text" && document.getElementById("angebotText").value !== "Noch kein Angebot erstellt.") ? "inline-block" : "none";
  });

  document.getElementById("copyButton").addEventListener("click", () => {
    document.getElementById("angebotText").select();
    document.execCommand('copy');
    const b = document.getElementById("copyButton");
    b.textContent = "✅ Kopiert!";
    setTimeout(() => { b.textContent = "📋 Text kopieren"; }, 2000);
  });

  // ===================== ADD / REMOVE =====================
  document.getElementById("addProductButton").addEventListener("click", () => {
    const pId = document.getElementById("produktSelect").value;
    const m = parseInt(document.getElementById("mengeInput").value);
    const dauer = document.getElementById("dauerSelect").value;
    const start = document.getElementById("startInput").value.trim();
    const ab = document.getElementById("abSelect").value;
    const nach = document.getElementById("nachInput").value.trim();
    if (!pId) { alert("Bitte wähle ein Produkt aus."); return; }
    if (isNaN(m) || m <= 0) { alert("Bitte gib eine gültige Menge ein."); return; }
    const p = produkte.find(x => x.id === pId); if (!p) return;
    const entry = { id: pId, name: p.name, menge: m, dauer, start, ab, nach };
    const ei = addedProducts.findIndex(x => x.id === pId);
    if (ei !== -1) addedProducts[ei] = entry; else addedProducts.push(entry);
    updateAddedProductsList(); clearProductForm();
  });

  function clearProductForm() {
    document.getElementById("produktSelect").value = "";
    document.getElementById("mengeInput").value = "1";
    document.getElementById("dauerSelect").value = "";
    document.getElementById("startInput").value = "";
    document.getElementById("abSelect").value = "";
    document.getElementById("nachInput").value = "";
  }

  function updateAddedProductsList() {
    const c = document.getElementById("addedProductsList");
    if (!addedProducts.length) { c.innerHTML = '<div class="no-products">Noch keine Produkte hinzugefügt</div>'; return; }
    c.innerHTML = addedProducts.map((p, i) => {
      let d = [];
      if (p.start && p.dauer) d.push(p.start + ' Messbecher täglich für ' + p.dauer);
      else if (p.start) d.push(p.start + ' Messbecher täglich');
      if (p.ab && p.nach) d.push(p.ab + ' ' + p.nach + ' Messbecher täglich');
      const dt = d.length ? '<div class="product-details">' + d.join(", ") + '</div>' : '';
      return '<div class="added-product"><div class="product-info"><img src="' + (icons[p.name]||'') + '" alt="' + p.name + '" class="product-icon"><div><strong>' + p.name + '</strong> (' + p.menge + 'x)' + dt + '</div></div><button type="button" class="remove-button" onclick="removeProduct(' + i + ')">🗑️ Entfernen</button></div>';
    }).join("");
  }

  window.removeProduct = function(i) { addedProducts.splice(i, 1); updateAddedProductsList(); };

  // ===================== GENERATE =====================
  function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2); }

  document.getElementById("generateButton").addEventListener("click", async () => {
    const kunde = document.getElementById("kundenname").value.trim();
    const pferd = document.getElementById("pferdename")?.value.trim() || "";
    const kanal = document.getElementById("kontaktkanal").value.trim();
    const berater = document.getElementById("beraterin").value.trim();
    const mode = document.getElementById("outputMode").value;
    const anrede = document.getElementById("anrede")?.value || "du";
    const oT = document.getElementById("angebotText");
    const oH = document.getElementById("angebotHTML");

    if (!addedProducts.length) {
      oT.value = "❗ Bitte füge mindestens ein Produkt hinzu.";
      oH.style.display = "none"; oT.style.display = "block"; return;
    }

    // Fire-and-forget to Supabase
    recordAngebot(berater, kanal, addedProducts.length);

    // GA best-effort
    try { if (typeof gtag !== 'undefined') gtag('event', 'angebot_generated', { event_category: 'Angebotsgenerator', beraterin: berater, kontaktkanal: kanal, produkt_anzahl: addedProducts.length }); } catch(e) {}

    const tp = new URLSearchParams();
    tp.set('utm_source', 'servicelink');
    if (kanal) tp.set('utm_medium', kanal);
    if (berater) tp.set('utm_content', berater);
    tp.set('link_id', uid());

    let items = [], textP = [];
    addedProducts.forEach(p => {
      let d = [];
      if (p.start && p.dauer) d.push(p.start + ' Messbecher täglich für ' + p.dauer);
      else if (p.start) d.push(p.start + ' Messbecher täglich');
      if (p.ab && p.nach) d.push(p.ab + ' ' + p.nach + ' Messbecher täglich');
      items.push(p.id + ':' + p.menge);
      textP.push(p.name + (d.length ? ' (' + d.join(", ") + ')' : ''));
    });

    const cartUrl = 'https://' + SHOP_DOMAIN + '/cart/' + items.join(',') + '?' + tp.toString();

    let b = 'Hallo ' + kunde + ',\n\n', e, h, a;
    if (anrede === "du") {
      e = 'danke für die ganzen Infos!\nAuf dieser Basis empfehlen wir dir folgende Produkte für dein Pferd' + (pferd ? ' ' + pferd : '') + ':\n\n';
      h = 'Du musst einfach nur auf den Link klicken und schon werden die entsprechenden Produkte automatisch deinem Warenkorb hinzugefügt:\n';
      a = '\nWenn du weitere Fragen hast, melde dich gerne jederzeit wieder bei uns!';
    } else {
      e = 'danke für die ganzen Informationen!\nAuf dieser Basis empfehlen wir Ihnen folgende Produkte für Ihr Pferd' + (pferd ? ' ' + pferd : '') + ':\n\n';
      h = 'Sie müssen einfach nur auf den Link klicken und schon werden die entsprechenden Produkte automatisch Ihrem Warenkorb hinzugefügt:\n';
      a = '\nSollten Sie weitere Fragen haben, melden Sie sich gerne jederzeit wieder bei uns!';
    }

    const body = b + e + textP.join("\n") + '\n\n' + h + '👉 Jetzt bestellen: ' + cartUrl + a;

    if (mode === "text") {
      oT.style.display = "block"; oH.style.display = "none"; oT.value = body;
      document.getElementById("copyButton").style.display = "inline-block";
    } else {
      oT.style.display = "none"; oH.style.display = "block";
      oH.innerHTML = '<p>' + (kunde ? 'Hallo ' + kunde + ',' : '') + '</p><p>' +
        (anrede === "du"
          ? 'danke für die ganzen Infos!<br>Auf dieser Basis empfehlen wir dir folgende Produkte für dein Pferd' + (pferd ? ' „' + pferd + '"' : '') + ':'
          : 'danke für die ganzen Informationen!<br>Auf dieser Basis empfehlen wir Ihnen folgende Produkte für Ihr Pferd' + (pferd ? ' „' + pferd + '"' : '') + ':') +
        '</p><ul>' + textP.map(p => '<li>' + p + '</li>').join('') + '</ul><p>' +
        (anrede === "du"
          ? 'Du musst einfach nur auf den Link klicken und schon werden die entsprechenden Produkte automatisch deinem Warenkorb hinzugefügt:'
          : 'Sie müssen einfach nur auf den Link klicken und schon werden die entsprechenden Produkte automatisch Ihrem Warenkorb hinzugefügt:') +
        '</p><p>👉 <a href="' + cartUrl + '" target="_blank" style="display:inline-block;padding:10px 20px;background:#4CAF50;color:white;text-decoration:none;border-radius:5px;">🛒 Jetzt bestellen</a></p><p>' +
        (anrede === "du" ? 'Wenn du weitere Fragen hast, melde dich gerne jederzeit wieder bei uns!' : 'Sollten Sie weitere Fragen haben, melden Sie sich gerne jederzeit wieder bei uns!') + '</p>';
      document.getElementById("copyButton").style.display = "none";
    }

    document.getElementById("successNotification").style.display = "block";
    setTimeout(() => { document.getElementById("successNotification").style.display = "none"; }, 5000);
    setTimeout(() => loadAndRenderStats(), 1000);
  });

  // ===================== INIT =====================
  loadAndRenderStats();

  // ===================== CONFETTI =====================
  const canvas = document.getElementById("confettiCanvas");
  const ctx = canvas.getContext("2d");
  function rc() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  rc(); window.addEventListener('resize', rc);

  document.getElementById("generateButton").addEventListener("click", function(ev) {
    const r = ev.currentTarget.getBoundingClientRect();
    const ox = r.left + r.width/2, oy = r.top + r.height/2;
    const ps = [], cs = ['#f00','#0f0','#00f','#ff0','#0ff','#f0f'];
    for (let i=0;i<80;i++) { const an=Math.random()*2*Math.PI, sp=Math.random()*5+2; ps.push({x:ox,y:oy,dx:Math.cos(an)*sp,dy:Math.sin(an)*sp,r:Math.random()*4+2,c:cs[Math.floor(Math.random()*cs.length)],l:60}); }
    (function anim() {
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ps.forEach(p=>{ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,2*Math.PI);ctx.fillStyle=p.c;ctx.fill();p.x+=p.dx;p.y+=p.dy;p.dy+=0.2;p.l--;});
      for(let i=ps.length-1;i>=0;i--) if(ps[i].l<=0) ps.splice(i,1);
      if(ps.length>0) requestAnimationFrame(anim); else ctx.clearRect(0,0,canvas.width,canvas.height);
    })();
  });

});
</script>
</body>
</html>
