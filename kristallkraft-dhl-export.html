  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useCallback } = React;

    const App = () => {
      const [entries, setEntries] = useState([]);
      const [selectedIds, setSelectedIds] = useState(new Set());
      const [fileName, setFileName] = useState('');
      const [isLoading, setIsLoading] = useState(false);

      const parseExcel = useCallback((file) => {
        setIsLoading(true);
        const reader = new FileReader();
        
        reader.onload = (e) => {
          try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array', cellDates: true });
            const sheetName = workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];
            const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: '' });
            
            const processedEntries = jsonData.map((row, index) => {
              const versendet = row['Versendet'];
              const hasVersendetDate = versendet && 
                versendet.toString().trim() !== '' && 
                versendet.toString().trim() !== '--------' &&
                versendet.toString().trim().toLowerCase() !== 'nan';
              
              // Datum handling für Excel Serial Dates
              let veranstaltungsdatum = row['Datum der Veranstaltung'] || '';
              if (veranstaltungsdatum instanceof Date) {
                veranstaltungsdatum = veranstaltungsdatum.toLocaleDateString('de-DE');
              } else if (typeof veranstaltungsdatum === 'number') {
                // Excel serial date
                const excelEpoch = new Date(1899, 11, 30);
                const date = new Date(excelEpoch.getTime() + veranstaltungsdatum * 86400000);
                veranstaltungsdatum = date.toLocaleDateString('de-DE');
              }
              
              return {
                id: index,
                oderId: row['Id'] || index,
                vorname: row['Vorname'] || '',
                nachname: row['Nachname'] || '',
                vereinsname: row['Name des Vereins'] || '',
                ev: row['Eingetragener Verein (e.V.)'] || '',
                strasse: row['Strasse/ Lief.'] || '',
                strasseVerein: row['Strasse Verein'] || '',
                nummer: row['Nummer'] || '',
                hausnrVerein: row['Hausnummer'] || '',
                plz: row['Postleitzahl/ Lief.'] || '',
                plzVerein: row['PLZ/Verein'] || '',
                ort: row['Lieferort'] || '',
                ortVerein: row['Ort/Verein'] || '',
                email: row['Email'] || '',
                veranstaltung: row['Art der Veranstaltung:'] || '',
                veranstaltungsdatum: veranstaltungsdatum,
                finanzamt: row['Zuständiges Finanzamt:'] || '',
                steuernr: row['Steuernummer:'] || '',
                veranlagung: row['Veranlagungszeitraum:'] || '',
                freistellung: row['Datum des Freistellungsbescheides:'] || '',
                versendet: versendet || '',
                isAlreadySent: hasVersendetDate,
              };
            }).filter(entry => entry.vorname || entry.nachname || entry.vereinsname);

            setEntries(processedEntries);
            // Standardmäßig KEINE Einträge vorausgewählt
            setSelectedIds(new Set());
            setFileName(file.name);
          } catch (error) {
            alert('Fehler beim Lesen der Datei: ' + error.message);
          }
          setIsLoading(false);
        };
        
        reader.readAsArrayBuffer(file);
      }, []);

      const handleFileDrop = useCallback((e) => {
        e.preventDefault();
        const file = e.dataTransfer?.files[0] || e.target.files?.[0];
        if (file && (file.name.endsWith('.xlsx') || file.name.endsWith('.xls'))) {
          parseExcel(file);
        } else {
          alert('Bitte eine Excel-Datei (.xlsx oder .xls) hochladen.');
        }
      }, [parseExcel]);

      const toggleSelection = (id) => {
        setSelectedIds(prev => {
          const newSet = new Set(prev);
          if (newSet.has(id)) {
            newSet.delete(id);
          } else {
            newSet.add(id);
          }
          return newSet;
        });
      };

      const selectAll = () => {
        const selectableIds = entries.filter(e => !e.isAlreadySent).map(e => e.id);
        setSelectedIds(new Set(selectableIds));

      const deselectAll = () => {
        setSelectedIds(new Set());
      };

      const formatDate = (date) => {
        if (!date) return '';
        if (date instanceof Date) {
          const d = date.getDate().toString().padStart(2, '0');
          const m = (date.getMonth() + 1).toString().padStart(2, '0');
          const y = date.getFullYear().toString().slice(-2);
          return d + '.' + m + '.' + y;
        }
        return date.toString();
      };

      const formatDateLong = (date) => {
        const d = date.getDate().toString().padStart(2, '0');
        const m = (date.getMonth() + 1).toString().padStart(2, '0');
        const y = date.getFullYear();
        return d + '.' + m + '.' + y;
      };

      const generateDHLCSV = () => {
        const selectedEntries = entries.filter(e => selectedIds.has(e.id) && !e.isAlreadySent);
        
        if (selectedEntries.length === 0) {
          alert('Keine Einträge ausgewählt.');
          return;
        }

        const today = new Date();
        const deliveryDate = today.getDate().toString().padStart(2, '0') + '.' + (today.getMonth() + 1).toString().padStart(2, '0') + '.' + today.getFullYear().toString().slice(-2);
        
        const header = '"OrderNo"|"s_name1"|"s_name2"|"s_street"|"s_zipcodeno"|"s_town"|"s_country"|"s_phone"|"s_mail"|"quantity"|"products"|"delivery_date"|"CustomerNo"|"Total_weight"|"Abrechnungsnummer"|"AbsName"|"AbsStrasse"|"AbsPLZOrt"|"AbsLand"|"Zuordnung"|"AbsTel"';
        
        const rows = selectedEntries.map((entry) => {
          const orderNo = 'Sponsoring-' + entry.oderId;
          const name1 = (entry.vorname + ' ' + entry.nachname).trim();
          const name2 = entry.vereinsname;
          const street = (entry.strasse + ' ' + entry.nummer).trim();
          const plz = entry.plz.toString().replace('.0', '').split('.')[0];
          const town = entry.ort;
          const email = entry.email;
          
          return '"' + orderNo + '"|"' + name1 + '"|"' + name2 + '"|"' + street + '"|"' + plz + '"|"' + town + '"|"DE"|""|"' + email + '"|"1"|"CL-7, KK-8"|"' + deliveryDate + '"|""|"15,9"|"60796335170102"|"Kristallkraft Naturprodukte"|"Hauptstraße 3"|"29499 Zernien"|"DE"|"V01PAK"|"4958639836090"';
        });

        const csvContent = '\uFEFF' + header + '\r\n' + rows.join('\r\n');
        
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement('a');
        link.href = url;
        const dateStr = today.getDate().toString().padStart(2, '0') + '_' + (today.getMonth() + 1).toString().padStart(2, '0') + '_' + today.getFullYear().toString().slice(-2);
        const timeStr = today.getHours().toString().padStart(2, '0') + '_' + today.getMinutes().toString().padStart(2, '0') + '_' + today.getSeconds().toString().padStart(2, '0');
        link.download = 'DHL_ZL_DE_-_' + dateStr + '_-_' + timeStr + '.csv';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
      };

      // Spendenbescheinigung PDF Generator
      const generateSpendenbescheinigung = () => {
        const selectedEntries = entries.filter(e => selectedIds.has(e.id) && !e.isAlreadySent);
        
        if (selectedEntries.length === 0) {
          alert('Keine Einträge ausgewählt.');
          return;
        }

        // jsPDF Check
        if (!window.jspdf || !window.jspdf.jsPDF) {
          alert('Fehler: jsPDF Bibliothek nicht geladen. Bitte Seite neu laden.');
          console.error('jsPDF nicht gefunden:', window.jspdf);
          return;
        }

        const jsPDF = window.jspdf.jsPDF;

        try {
        selectedEntries.forEach((entry, idx) => {
          const doc = new jsPDF('p', 'mm', 'a4');
          const W = 210, LM = 16, RM = W - 16, CW = RM - LM;
          let y = 14;
          
          const gray = () => { doc.setTextColor(80, 80, 80); };
          const black = () => { doc.setTextColor(0, 0, 0); };
          const norm = (s) => { doc.setFont('helvetica', 'normal'); doc.setFontSize(s || 8); black(); };
          const bold = (s) => { doc.setFont('helvetica', 'bold'); doc.setFontSize(s || 8); black(); };
          const rect = (x, y2, w, h) => { doc.setDrawColor(120); doc.setLineWidth(0.3); doc.rect(x, y2, w, h); };

          // Vereinsname mit e.V. suffix handling - als String
          let verein = String(entry.vereinsname || '');
          const ev = String(entry.ev || '');
          if (ev && ev.toLowerCase().includes('ja') && !verein.toLowerCase().includes('e.v.')) {
            verein = verein + ' e.V.';
          }
          
          // Adresse aufbauen - alle Werte als String
          const strasseVerein = String(entry.strasseVerein || entry.strasse || '');
          const hausnrVerein = String(entry.hausnrVerein || entry.nummer || '');
          const plzVereinRaw = entry.plzVerein || entry.plz || '';
          const plzVerein = String(plzVereinRaw).replace('.0', '').split('.')[0];
          const ortVerein = String(entry.ortVerein || entry.ort || '');
          
          const adresseLines = [
            verein,
            [strasseVerein, hausnrVerein].filter(Boolean).join(' '),
            [plzVerein, ortVerein].filter(Boolean).join(' ')
          ].filter(Boolean);

          // BOX: Aussteller
          rect(LM, y, CW, 20);
          gray(); doc.setFontSize(6.5);
          doc.text('Aussteller (Bezeichnung und Anschrift der steuerbegünstigten Einrichtung)', LM + 2, y + 3.5);
          norm(9);
          adresseLines.forEach((line, i) => doc.text(line, LM + 2, y + 8 + i * 4));
          y += 22;

          // Titel
          bold(12); doc.text('Bestätigung über Sachzuwendungen', LM, y + 5); y += 7;
          norm(7);
          const sub = doc.splitTextToSize('im Sinne des § 10b des Einkommensteuergesetzes an eine der in § 5 Abs. 1 Nr. 9 des Körperschaftsteuergesetzes bezeichneten Körperschaften, Personenvereinigungen oder Vermögensmassen', CW);
          doc.text(sub, LM, y + 2); y += sub.length * 3 + 5;

          // BOX: Zuwendender
          rect(LM, y, CW, 18);
          gray(); doc.setFontSize(6.5);
          doc.text('Name und Anschrift des Zuwendenden:', LM + 2, y + 3.5);
          norm(9);
          doc.text('Kristallkraft Naturprodukte GmbH & Co. KG', LM + 2, y + 8);
          doc.text('Hauptstraße 3', LM + 2, y + 12);
          doc.text('29499 Gülden', LM + 2, y + 16);
          y += 20;

          // ROW: Wert / Buchstaben / Tag
          const c1 = 55, c2 = 80, c3 = CW - c1 - c2;
          rect(LM, y, c1, 12); rect(LM + c1, y, c2, 12); rect(LM + c1 + c2, y, c3, 12);
          gray(); doc.setFontSize(6.5);
          doc.text('Wert der Zuwendung - in Ziffern -', LM + 2, y + 3.5);
          doc.text('- in Buchstaben -', LM + c1 + 2, y + 3.5);
          doc.text('Tag der Zuwendung:', LM + c1 + c2 + 2, y + 3.5);
          norm(9);
          doc.text('132,80', LM + 2, y + 9);
          doc.text('hundertzweiunddreißig euro und achtzig cent', LM + c1 + 2, y + 9);
          const tagDerZuwendung = String(entry.veranstaltungsdatum || new Date().toLocaleDateString('de-DE'));
          doc.text(tagDerZuwendung, LM + c1 + c2 + 2, y + 9);
          y += 14;

          // BOX: Bezeichnung
          rect(LM, y, CW, 16);
          gray(); doc.setFontSize(6.5);
          doc.text('Genaue Bezeichnung der Sachzuwendung mit Alter, Zustand, Kaufpreis usw.', LM + 2, y + 3.5);
          norm(9);
          doc.text('1x Kristallkraft No1        59,90€', LM + 2, y + 8.5);
          doc.text('1x Kristallkraft Coolly     72,90€', LM + 2, y + 12.5);
          y += 18;

          // Checkboxen
          norm(7.5);
          const checkbox = (checked, text, yPos) => {
            doc.setDrawColor(120); doc.setLineWidth(0.3); doc.rect(LM, yPos, 4, 4);
            if (checked) { bold(9); doc.text('X', LM + 0.7, yPos + 3.3); norm(7.5); }
            const lines = doc.splitTextToSize(text, CW - 8);
            doc.text(lines, LM + 7, yPos + 3);
            return yPos + Math.max(lines.length * 3.2, 5) + 1.5;
          };

          y = checkbox(true, 'Die Sachzuwendung stammt nach den Angaben des Zuwendenden aus dem Betriebsvermögen. Die Zuwendung wurde nach dem Wert der Entnahme (ggf. mit dem niedrigeren gemeinen Wert) und nach der Umsatzsteuer, die auf die Entnahme entfällt, bewertet.', y);
          y = checkbox(false, 'Die Sachzuwendung stammt nach den Angaben des Zuwendenden aus dem Privatvermögen.', y);
          y = checkbox(false, 'Der Zuwendende hat trotz Aufforderung keine Angaben zur Herkunft der Sachzuwendung gemacht.', y);
          y = checkbox(true, 'Geeignete Unterlagen, die zur Wertermittlung gedient haben, z. B. Rechnung, Gutachten, liegen vor.', y);
          y += 2;

          // Wir sind wegen Förderung - mit "des Sportes"
          y = checkbox(true, 'Wir sind wegen Förderung (Angabe des begünstigten Zwecks / der begünstigten Zwecke)', y);
          bold(9);
          doc.text('des Sportes', LM + 7, y); y += 6;

          // Freistellungsbescheid - alle Werte als String
          norm(7.5);
          doc.text('nach dem Freistellungsbescheid bzw. nach der Anlage zum Körperschaftsteuerbescheid des Finanzamtes', LM, y); y += 6;
          const fa = String(entry.finanzamt || '___________');
          const stnr = String(entry.steuernr || '___________');
          const frei = String(entry.freistellung || '___________');
          const vz = String(entry.veranlagung || '______');

          bold(9); doc.text(fa, LM, y);
          norm(7.5); const x1 = LM + Math.max(doc.getTextWidth(fa), 30) + 3;
          doc.text(', StNr.', x1, y); bold(9);
          const x2 = x1 + doc.getTextWidth(', StNr. ') + 1; doc.text(stnr, x2, y);
          norm(7.5); const x3 = x2 + Math.max(doc.getTextWidth(stnr), 25) + 3;
          doc.text(', vom', x3, y); bold(9);
          const x4 = x3 + doc.getTextWidth(', vom ') + 1; doc.text(frei, x4, y);
          norm(7.5); doc.text('für den letzten', x4 + Math.max(doc.getTextWidth(frei), 20) + 3, y);
          y += 5;

          norm(7.5); doc.text('Veranlagungszeitraum', LM, y);
          const vzLabelW = doc.getTextWidth('Veranlagungszeitraum');
          bold(9); doc.text(vz, LM + vzLabelW + 1, y);
          y += 5;
          norm(7.5);
          doc.text('nach § 5 Abs. 1 Nr. 9 des Körperschaftsteuergesetzes von der', LM, y);
          y += 4;
          doc.text('Körperschaftsteuer und nach § 3 Nr. 6 des Gewerbesteuergesetzes von der Gewerbesteuer befreit.', LM, y);
          y += 6;

          // §60a AO (leer)
          y = checkbox(false, 'Die Einhaltung der satzungsmäßigen Voraussetzungen nach den §§ 51, 59, 60 und 61 AO wurde vom Finanzamt', y);
          norm(7.5);
          doc.text('_____________, StNr. _____________, mit Bescheid vom _____________ nach § 60a AO', LM + 7, y); y += 4;
          doc.text('gesondert festgestellt. Wir fördern nach unserer Satzung (Angabe des begünstigten Zwecks / der begünstigsten Zwecke)', LM + 7, y);
          y += 7;

          // BOX: Bestätigung - mit "des Reitsports"
          rect(LM, y, CW, 20);
          norm(7.5);
          doc.text('Es wird bestätigt, dass die Zuwendung nur zur Förderung (Angabe des begünstigten Zwecks / der begünstigten Zwecke)', LM + 2, y + 4);
          bold(9); doc.text('des Reitsports', LM + 2, y + 10);
          norm(7.5); doc.text('verwendet wird.', LM + 2, y + 17);
          y += 23;

          // Unterschrift-Zeile (leer – wird handschriftlich ausgefüllt)
          y += 8;
          doc.setDrawColor(50); doc.setLineWidth(0.5); doc.line(LM, y, RM, y); y += 2;
          gray(); doc.setFontSize(6.5);
          doc.text('(Ort, Datum und Unterschrift des Zuwendungsempfängers)', LM, y + 2); y += 6;

          // Hinweis
          bold(7); doc.text('Hinweis:', LM, y); y += 3;
          norm(6.5);
          const h1 = doc.splitTextToSize('Wer vorsätzlich oder grob fahrlässig eine unrichtige Zuwendungsbestätigung erstellt oder veranlasst, dass Zuwendungen nicht zu den in der Zuwendungsbestätigung angegebenen steuerbegünstigten Zwecken verwendet werden, haftet für die entgangene Steuer (§ 10b Abs. 4 EStG, § 9 Abs. 3 KStG, § 9 Nr. 5 GewStG).', CW);
          doc.text(h1, LM, y); y += h1.length * 2.5 + 2;
          const h2 = doc.splitTextToSize('Diese Bestätigung wird nicht als Nachweis für die steuerliche Berücksichtigung der Zuwendung anerkannt, wenn das Datum des Freistellungsbescheides länger als 5 Jahre bzw. das Datum der Feststellung der Einhaltung der satzungsmäßigen Voraussetzungen nach § 60a Abs. 1 AO länger als 3 Jahre seit Ausstellung des Bescheides zurückliegt (§ 63 Abs. 5 AO).', CW);
          doc.text(h2, LM, y); y += h2.length * 2.5 + 5;

          // Footer
          bold(6.5);
          doc.text('034123 Bestätigung über Sachzuwendung / steuerbegünstigte Einrichtung / Verein (2013)', LM, y);

          // Save PDF
          const fn = 'Spendenbescheinigung_' + (verein || 'Verein').replace(/[^a-zA-Z0-9äöüÄÖÜß]/g, '_') + '_' + new Date().toISOString().slice(0, 10) + '.pdf';
          doc.save(fn);
        });

        alert(selectedEntries.length + ' Spendenbescheinigung(en) wurden heruntergeladen.');
        } catch (err) {
          console.error('Fehler bei PDF-Generierung:', err);
          alert('Fehler bei der PDF-Generierung: ' + err.message);
        }
      };

      const selectedCount = [...selectedIds].filter(id => !entries.find(e => e.id === id)?.isAlreadySent).length;
      const sentCount = entries.filter(e => e.isAlreadySent).length;
      const availableCount = entries.filter(e => !e.isAlreadySent).length;

      return (
        <div style={{ minHeight: '100vh', padding: '24px' }}>
          <div style={{
            maxWidth: '1400px',
            margin: '0 auto 24px',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'space-between',
            flexWrap: 'wrap',
            gap: '16px'
          }}>
            <div>
              <h1 style={{
                margin: 0,
                fontSize: '28px',
                fontWeight: 700,
                background: 'linear-gradient(90deg, #ffd700, #ffaa00)',
                WebkitBackgroundClip: 'text',
                WebkitTextFillColor: 'transparent',
                letterSpacing: '-0.5px'
              }}>
                🐴 Kristallkraft Sponsoring
              </h1>
              <p style={{ margin: '4px 0 0', opacity: 0.7, fontSize: '14px' }}>
                DHL Versand-Export Tool
              </p>
            </div>
            
            {entries.length > 0 && (
              <div style={{
                background: 'rgba(255,255,255,0.1)',
                borderRadius: '8px',
                padding: '8px 16px',
                fontSize: '13px'
              }}>
                <span style={{ opacity: 0.7 }}>Verfügbar:</span>{' '}
                <strong style={{ color: '#4ade80' }}>{availableCount}</strong>
                <span style={{ margin: '0 8px', opacity: 0.3 }}>|</span>
                <span style={{ opacity: 0.7 }}>Versendet:</span>{' '}
                <strong style={{ color: '#f87171' }}>{sentCount}</strong>
                <span style={{ margin: '0 8px', opacity: 0.3 }}>|</span>
                <span style={{ opacity: 0.7 }}>Ausgewählt:</span>{' '}
                <strong style={{ color: '#fbbf24' }}>{selectedCount}</strong>
              </div>
            )}
          </div>

          {entries.length === 0 && !isLoading && (
            <div 
              onDrop={handleFileDrop}
              onDragOver={(e) => e.preventDefault()}
              onClick={() => document.getElementById('fileInput').click()}
              style={{
                maxWidth: '600px',
                margin: '80px auto',
                border: '2px dashed rgba(255,215,0,0.4)',
                borderRadius: '16px',
                padding: '60px 40px',
                textAlign: 'center',
                background: 'rgba(255,255,255,0.03)',
                cursor: 'pointer'
              }}
            >
              <div style={{ fontSize: '64px', marginBottom: '16px' }}>📁</div>
              <h2 style={{ margin: '0 0 8px', fontWeight: 600 }}>Excel-Datei hochladen</h2>
              <p style={{ opacity: 0.6, margin: 0 }}>
                Zieh die Sponsoring-Anfragen Excel-Datei hierher<br />
                oder klick zum Auswählen
              </p>
              <input
                id="fileInput"
                type="file"
                accept=".xlsx,.xls"
                onChange={handleFileDrop}
                style={{ display: 'none' }}
              />
            </div>
          )}

          {isLoading && (
            <div style={{ textAlign: 'center', padding: '60px' }}>
              <div style={{ fontSize: '48px' }}>⏳</div>
              <p>Datei wird verarbeitet...</p>
            </div>
          )}

          {entries.length > 0 && !isLoading && (
            <div style={{ maxWidth: '1400px', margin: '0 auto' }}>
              <div style={{
                display: 'flex',
                gap: '12px',
                marginBottom: '16px',
                flexWrap: 'wrap',
                alignItems: 'center'
              }}>
                <button
                  onClick={() => { setEntries([]); setSelectedIds(new Set()); setFileName(''); }}
                  style={{
                    padding: '10px 20px',
                    background: 'rgba(255,255,255,0.1)',
                    border: '1px solid rgba(255,255,255,0.2)',
                    borderRadius: '8px',
                    color: '#fff',
                    cursor: 'pointer',
                    fontSize: '14px'
                  }}
                >
                  📂 Neue Datei
                </button>
                
                <button
                  onClick={selectAll}
                  style={{
                    padding: '10px 20px',
                    background: 'rgba(74, 222, 128, 0.2)',
                    border: '1px solid rgba(74, 222, 128, 0.4)',
                    borderRadius: '8px',
                    color: '#4ade80',
                    cursor: 'pointer',
                    fontSize: '14px'
                  }}
                >
                  ✓ Alle
                </button>
                
                <button
                  onClick={deselectAll}
                  style={{
                    padding: '10px 20px',
                    background: 'rgba(248, 113, 113, 0.2)',
                    border: '1px solid rgba(248, 113, 113, 0.4)',
                    borderRadius: '8px',
                    color: '#f87171',
                    cursor: 'pointer',
                    fontSize: '14px'
                  }}
                >
                  ✗ Keine
                </button>
                
                <div style={{ flex: 1 }} />
                
                <button
                  onClick={generateAnschreiben}
                  disabled={selectedCount === 0}
                  style={{
                    padding: '12px 24px',
                    background: selectedCount > 0 ? 'linear-gradient(135deg, #60a5fa, #3b82f6)' : 'rgba(255,255,255,0.1)',
                    border: 'none',
                    borderRadius: '8px',
                    color: selectedCount > 0 ? '#fff' : '#666',
                    cursor: selectedCount > 0 ? 'pointer' : 'not-allowed',
                    fontSize: '14px',
                    fontWeight: 600
                  }}
                >
                  📄 Anschreiben ({selectedCount})
                </button>
                
                <button
                  onClick={generateSpendenbescheinigung}
                  disabled={selectedCount === 0}
                  style={{
                    padding: '12px 24px',
                    background: selectedCount > 0 ? 'linear-gradient(135deg, #a855f7, #7c3aed)' : 'rgba(255,255,255,0.1)',
                    border: 'none',
                    borderRadius: '8px',
                    color: selectedCount > 0 ? '#fff' : '#666',
                    cursor: selectedCount > 0 ? 'pointer' : 'not-allowed',
                    fontSize: '14px',
                    fontWeight: 600
                  }}
                >
                  📋 Spendenbescheinigung ({selectedCount})
                </button>
                
                <button
                  onClick={generateDHLCSV}
                  disabled={selectedCount === 0}
                  style={{
                    padding: '12px 24px',
                    background: selectedCount > 0 ? 'linear-gradient(135deg, #ffd700, #ffaa00)' : 'rgba(255,255,255,0.1)',
                    border: 'none',
                    borderRadius: '8px',
                    color: selectedCount > 0 ? '#1a1a2e' : '#666',
                    cursor: selectedCount > 0 ? 'pointer' : 'not-allowed',
                    fontSize: '14px',
                    fontWeight: 600
                  }}
                >
                  📦 DHL CSV ({selectedCount})
                </button>
              </div>

              <div style={{
                background: 'rgba(255,255,255,0.05)',
                borderRadius: '8px',
                padding: '12px 16px',
                marginBottom: '16px',
                fontSize: '13px'
              }}>
                📄 <strong>{fileName}</strong>
                <span style={{ opacity: 0.4, marginLeft: '16px' }}>Produkte: CL-7, KK-8</span>
              </div>

              <div style={{
                background: 'rgba(0,0,0,0.3)',
                borderRadius: '12px',
                overflow: 'hidden',
                border: '1px solid rgba(255,255,255,0.1)'
              }}>
                <div style={{ overflowX: 'auto' }}>
                  <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: '13px' }}>
                    <thead>
                      <tr style={{ background: 'rgba(255,255,255,0.05)' }}>
                        <th style={{ padding: '14px 12px', textAlign: 'center', width: '50px', borderBottom: '1px solid rgba(255,255,255,0.1)' }}>✓</th>
                        <th style={{ padding: '14px 12px', textAlign: 'left', borderBottom: '1px solid rgba(255,255,255,0.1)' }}>Name</th>
                        <th style={{ padding: '14px 12px', textAlign: 'left', borderBottom: '1px solid rgba(255,255,255,0.1)' }}>Verein</th>
                        <th style={{ padding: '14px 12px', textAlign: 'left', borderBottom: '1px solid rgba(255,255,255,0.1)' }}>Adresse</th>
                        <th style={{ padding: '14px 12px', textAlign: 'left', borderBottom: '1px solid rgba(255,255,255,0.1)' }}>PLZ / Ort</th>
                        <th style={{ padding: '14px 12px', textAlign: 'left', borderBottom: '1px solid rgba(255,255,255,0.1)' }}>Veranstaltung</th>
                        <th style={{ padding: '14px 12px', textAlign: 'center', borderBottom: '1px solid rgba(255,255,255,0.1)' }}>Status</th>
                      </tr>
                    </thead>
                    <tbody>
                      {entries.map((entry) => (
                        <tr 
                          key={entry.id}
                          onClick={() => !entry.isAlreadySent && toggleSelection(entry.id)}
                          style={{
                            background: entry.isAlreadySent ? 'rgba(100,100,100,0.15)' : selectedIds.has(entry.id) ? 'rgba(255,215,0,0.1)' : 'transparent',
                            opacity: entry.isAlreadySent ? 0.4 : 1,
                            cursor: entry.isAlreadySent ? 'not-allowed' : 'pointer'
                          }}
                        >
                          <td style={{ padding: '12px', textAlign: 'center', borderBottom: '1px solid rgba(255,255,255,0.05)' }}>
                            {entry.isAlreadySent ? (
                              <span style={{ color: '#666' }}>—</span>
                            ) : (
                              <input
                                type="checkbox"
                                checked={selectedIds.has(entry.id)}
                                onChange={() => toggleSelection(entry.id)}
                                onClick={(e) => e.stopPropagation()}
                                style={{ width: '18px', height: '18px', cursor: 'pointer', accentColor: '#ffd700' }}
                              />
                            )}
                          </td>
                          <td style={{ padding: '12px', borderBottom: '1px solid rgba(255,255,255,0.05)', fontWeight: 500 }}>
                            {entry.vorname} {entry.nachname}
                          </td>
                          <td style={{ padding: '12px', borderBottom: '1px solid rgba(255,255,255,0.05)', maxWidth: '200px' }}>
                            <div style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', fontSize: '12px' }}>
                              {entry.vereinsname}
                            </div>
                          </td>
                          <td style={{ padding: '12px', borderBottom: '1px solid rgba(255,255,255,0.05)' }}>
                            {entry.strasse} {entry.nummer}
                          </td>
                          <td style={{ padding: '12px', borderBottom: '1px solid rgba(255,255,255,0.05)' }}>
                            <span style={{ background: 'rgba(255,255,255,0.1)', padding: '2px 8px', borderRadius: '4px', fontSize: '12px', fontFamily: 'monospace' }}>
                              {entry.plz.toString().replace('.0', '').split('.')[0]}
                            </span>
                            {' '}{entry.ort}
                          </td>
                          <td style={{ padding: '12px', borderBottom: '1px solid rgba(255,255,255,0.05)', fontSize: '12px' }}>
                            {entry.veranstaltung}
                            {entry.veranstaltungsdatum && <span style={{ opacity: 0.6, marginLeft: '8px' }}>({entry.veranstaltungsdatum})</span>}
                          </td>
                          <td style={{ padding: '12px', textAlign: 'center', borderBottom: '1px solid rgba(255,255,255,0.05)' }}>
                            {entry.isAlreadySent ? (
                              <span style={{ background: 'rgba(248, 113, 113, 0.2)', color: '#f87171', padding: '4px 10px', borderRadius: '12px', fontSize: '11px', fontWeight: 500 }}>
                                {entry.versendet}
                              </span>
                            ) : (
                              <span style={{ background: 'rgba(74, 222, 128, 0.2)', color: '#4ade80', padding: '4px 10px', borderRadius: '12px', fontSize: '11px', fontWeight: 500 }}>
                                Offen
                              </span>
                            )}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              </div>

              <div style={{
                marginTop: '16px',
                padding: '16px',
                background: 'rgba(255,215,0,0.1)',
                borderRadius: '8px',
                border: '1px solid rgba(255,215,0,0.2)',
                fontSize: '13px'
              }}>
                <strong style={{ color: '#ffd700' }}>💡 Hinweis:</strong>{' '}
                Grau markierte Einträge wurden bereits versendet. Produkte: <strong>CL-7</strong> und <strong>KK-8</strong>.
              </div>
            </div>
          )}
        </div>
      );
    };

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
